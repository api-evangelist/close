    post:
      operationId: create
      summary: Create an SMS activity
      description: >-
        *status* must be one of the following:

         - `inbox` to log an already received SMS.
         - `draft` to create a draft SMS.
         - `scheduled` to send an SMS at a scheduled date and time, which must be specified in the `date_scheduled` field.
         - `outbox` to actually **send** an SMS. To delay SMS sending by a few seconds (to allow undo), specify `send_in` in seconds (must be less than 60).
         - `sent` to log an already sent SMS.

        Only drafts can be modified, and their status can be changed to `scheduled` (to send later) or `outbox` (to send
        immediately). Scheduled SMS, or SMS in outbox that weren't sent yet can be canceled by setting the status back
        to `draft`.


        You have to provide a `local_phone` that will be used to send the SMS. The number you choose has to be
        associated with a Phone Number of type `internal`. See the [Phone
        Numbers](https://developer.close.com/api/resources/phone-numbers) paragraph for more details.


        A `template_id` referencing an SMS Template may be provided instead of `text` to automatically render that
        template and use the content as `text`.


        When `direction` is not provided, but `status="inbox"`, `direction` will default to "inbound". Otherwise,
        `direction` defaults to "outbound".


        When creating a new SMS with the status set to `inbox`, you can pass the query parameter `send_to_inbox` with
        the value of `true`  to create a corresponding Inbox Notification for the SMS.
      tags:
        - subpackage_activitiesSms
      parameters:
        - name: send_to_inbox
          in: query
          required: false
          schema:
            type: boolean
        - name: Authorization
          in: header
          description: Use your API key as the username and leave the password empty.
          required: true
