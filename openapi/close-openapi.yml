    CreatePhoneNumberRequest:
      type: object
      properties:
        bundle_id:
          type:
            - string
            - 'null'
        carrier_type:
          oneOf:
            - $ref: '#/components/schemas/CreatePhoneNumberRequestCarrierType'
            - type: 'null'
        country:
          type: string
          description: A two letter ISO country code (e.g. `US` for United States).
        prefix:
          type: string
          default: ''
          description: A string with the phone number prefix or area code, not including the country code.
        sharing:
          $ref: '#/components/schemas/PhoneNumberSharing'
          description: '`personal` for a number that belongs to an individual user, or `group` for a group number.'
        with_mms:
          type:
            - boolean
            - 'null'
          description: >-
            By default, MMS-capable numbers are rented if Close supports MMS for the given country. Renting an
            MMS-capable number can be forced by setting this flag to `true`. If set to `false`, certain prefixes that
            don't support MMS can be rented in countries where Close supports MMS. In most scenarios, this flag should
            not be passed. When you request an MMS number, you must set `with_sms` to `true` as well.
        with_sms:
          type:
            - boolean
            - 'null'
          description: >-
            By default, SMS-capable numbers are rented if Close supports SMS for the given country. Renting an
            SMS-capable number can be forced by setting this flag to `true`. If set to `false`, certain prefixes that
            don't support SMS can be rented in countries where Close supports SMS. In most scenarios, this flag should
            not be passed unless a `has-voice-only` error status is received.
      required:
        - country
        - sharing
      title: CreatePhoneNumberRequest
