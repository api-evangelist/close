  /report/custom/{org_id}/:
    get:
      operationId: get-custom
      summary: Get custom report (Explorer)
      description: |-
        This endpoint returns data that allows graphing of arbitrary metrics and is what powers "Explorer" in the UI.

         - `query` is an optional search query filter. When reporting on leads, any regular lead search query may be used. When reporting on activities or opportunities, only properties of the chosen object type may be used. For example, `direction:incoming` may be used if `x` starts with `email.`. Defaults to `*`, which includes all objects.
         - `y` is made up of the object type and field which is reported on the Y axis. For example the value `lead.count` (used by default) may be used to graph the number of leads, or a numeric field may be used. Examples: `call.duration` (for call length), `opportunity.value` (for value of opportunities).
         - `x` is the field which is reported on the X axis, for example "lead.custom.MRR" or "opportunity.date_created".
         - `interval`: Graph interval, i.e. the precision of the X axis. For time based graphs (`x` is a date field), one of `auto`, `hour`, `day`, `week`, `month`, `quarter`, `year` (defaults to `auto`, which is chosen based on `start` and `end`). For graphs with a numeric X axis, an integer number can be specified to indicate the histogram interval (`auto` by default).
         - `group_by`: Optional field name by which the report will be grouped. When grouping, a separate series will be returned for each group. By default no grouping is applied.
         - `transform_y`: Transformation function that gets applied to the `y` parameter. One of `sum` (default), `avg`, `min`, or `max`. Does not apply for `.count` `y` values if `x` is of the same object type.
         - `start`: Date or integer of the start of the X axis range. For dates, defaults to the date of creation of your organization.
         - `end`: Date or integer of the end of the X axis range. For dates, defaults to now.

         To get a full list of fields that can be used, do a GET to `/report/custom/fields/`. Only the `number` data type can be used for the `y` parameter.
      tags:
        - subpackage_reporting
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: x
          in: query
          required: false
          schema:
            type: string
        - name: 'y'
          in: query
          required: false
          schema:
            type: string
        - name: group_by
          in: query
          required: false
          schema:
            type: string
        - name: transform_y
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ReportCustomOrgIdGetParametersTransformY'
        - name: interval
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          schema:
            type: string
        - name: end
          in: query
          required: false
          schema:
            type: string
        - name: Authorization
          in: header
          description: Use your API key as the username and leave the password empty.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/reporting_getCustom_Response_200'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Any type
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: Not found
          content:
            application/json:
              schema:
                description: Any type
  /report/funnel/opportunity/stages/:
    post:
      operationId: get-funnel-stages
      summary: Get a funnel report (stages)
      description: >-
        The opportunity funnel "stages" report returns the pipeline funnel's metrics for the selected opportunities,
        aggregated (JSON format only) and per-user (JSON and CSV formats).


        Every report accepts the following parameters:


        * `pipeline`: ID of the pipeline defining the funnel statuses.

        * `type`: the type of the report. The available values are `created-cohort` and `active-stage-cohort`.

        * `report_relative_range`: a relative time range to fetch data for. The allowed values are: `today`,
        `this-week`, `this-month`, `this-quarter`, `this-year`, `yesterday`, `last-week`, `last-month`, `last-quarter`,
        `last-year`, and `all-time`.

        * `report_datetime_range`: a time range to fetch data for.

        * `cohort_relative_range`: a relative time range defining the cohort of created opportunities to fetch data for,
        by date of creation of those opportunities. The allowed values are: `today`, `this-week`, `this-month`,
        `this-quarter`, `this-year`, `yesterday`, `last-week`, `last-month`, `last-quarter`, `last-year`, and
        `all-time`. Either this field or `cohort_datetime_range` needs to be specified for `created-cohort` reports. Its
        value will be ignored for `active-stage-cohort` reports.

        * `cohort_datetime_range`: a time range defining the cohort of created opportunities to fetch data for, by date
        of creation of those opportunities. Either this field or `cohort_relative_range` needs to be specified for
        `created-cohort` reports. Its value will be ignored for `active-stage-cohort` reports.

        * `compared_relative_range`: a relative time range to fetch comparison data for. Only allowed in combination
        with `report_relative_range` (for `active-stage-cohort` reports) or `cohort_relative_range` (for
        `created-cohort` reports). The allowed values are: `today`, `this-week`, `this-month`, `this-quarter`,
        `this-year`, `yesterday`, `last-week`, `last-month`, `last-quarter`, `last-year`, and `all-time`.

        * `compared_datetime_range`: a relative time range to fetch comparison data for. Only allowed in combination
        with `report_datetime_range` (for `active-stage-cohort` reports) or `cohort_datetime_range` (for
        `created-cohort` reports). The allowed values are: `same-days-last-week`, `same-days-last-month`,
        `same-days-last-quarter`, `same-days-last-year`.

        * `compared_custom_range`: a time range to fetch comparison data for.

        * `query`: a query to apply to the report to filter out data.
          The value of the field is a dictionary with the key `type` and any type-specific keys. For now only the type `saved_search` is allowed which takes the extra key `saved_search_id` to specify the ID of a saved search. This parameter is *optional*.
        * `users`: a list of user IDs or group IDs to limit the report results to. When it's empty, the report will
        include all the available users. This parameter is *optional*.


        The report can be requested either in JSON format or in CSV format. The format can be specified with the
        `accept` header.


        In JSON format, it includes aggregated and per-user data. When requested in CSV format, it includes only
        per-user data.


        When `compared_datetime_range`, `compared_relative_range`, or `compared_custom_range` are used, the report
        returned is the compared one, not the base one.
      tags:
        - subpackage_reporting
      parameters:
        - name: Authorization
          in: header
          description: Use your API key as the username and leave the password empty.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/reporting_getFunnelStages_Response_200'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Any type
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: Not found
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              description: Any type
