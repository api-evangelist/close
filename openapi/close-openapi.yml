              schema:
                description: Any type
    post:
      operationId: create
      summary: Create new Webhook subscription
      description: |-
        The subscription will send events to the specified URL.

        Parameters:
          - `url` - Destination URL for the webhook subscription
          - `events` - A list of events to subscribe to. Each event has an `object_type` and an `action` from values in the [event log](https://developer.close.com/api/resources/events/list-of-event-types). You can also use [Webhook Filters](https://developer.close.com/api/resources/webhooks/webhook-filters) while creating your subscription so that an event only fires to a Webhook when certain conditions are met.
          - `verify_ssl` (optional)
            - `true` (default) - Verify SSL certificate of destination webhook URL.
            - `false` - Disable SSL certificate validation on destination webhook URL. We recommend using https to protect your data during delivery.
      tags:
        - subpackage_webhooks
      parameters:
        - name: Authorization
          in: header
          description: Use your API key as the username and leave the password empty.
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhooks_create_Response_201'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Any type
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: Not found
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhook'
