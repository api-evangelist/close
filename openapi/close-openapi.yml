  /phone_number/request/internal/:
    post:
      operationId: create
      summary: Request an internal phone number
      description: >-
        Renting a phone number incurs a cost. You need the "Manage Group Phone Numbers" permission to rent group
        numbers.


        If a number was rented, a 201 response is returned with the new number. If no number was rented (4xx response
        code), the response contains a `status` field which may contain one of the values below. New statuses may be
        added in the future.


        * `has-voice-only`: This country/prefix combination only has non-SMS-capable
          numbers. You can attempt renting the number by passing `with_sms` as `false`.
        * `needs-more-info`: More information (such as proof of address) is needed to
          rent this number. This number can only be rented by contacting Close support.
        * `billing-error`: An error related to billing has occurred. For example, the
          telephony budget has been reached, or there are not enough funds and recharging failed.
        * `error`: An error has occurred while renting this number. A human-readable
          message is returned in the `error` field.
      tags:
        - subpackage_phoneNumbers
      parameters:
        - name: Authorization
          in: header
          description: Use your API key as the username and leave the password empty.
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/phone_numbers_create_Response_201'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                description: Any type
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: Not found
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePhoneNumberRequest'
  /phone_number/{id}/:
    get:
      operationId: get
      summary: Retrieve a single phone number
      tags:
        - subpackage_phoneNumbers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: _fields
