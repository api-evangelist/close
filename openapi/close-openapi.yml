            type:
              - string
              - 'null'
        - name: user_id
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: user_id__in
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
        - name: status_id
          in: query
          required: false
