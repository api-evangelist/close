      summary: Update existing Webhook subscription
      description: |-
        All parameters are optional. Only the parameters that are provided will be updated.

        Parameters:
          - `url` - Destination URL for the webhook subscription
          - `events` - A list of events to subscribe to. Each event has an `object_type` and an `action` from values in the [event log](https://developer.close.com/api/resources/events/list-of-event-types). You can also use [Webhook Filters](https://developer.close.com/api/resources/webhooks/webhook-filters) while creating your subscription so that an event only fires to a Webhook when certain conditions are met.
          - `status` - Subscription status
            - `active` - activate the subscription
            - `paused` - pause the subscription
          - `verify_ssl`
            - `false` - Disable SSL certificate validation on destination webhook URL. We recommend using https to protect your data during delivery.
            - `true` - Verify SSL certificate of destination webhook URL.
      tags:
