naftiko: 1.0.0-alpha2
info:
  label: API Endpoints — subpackage_exports
  description: 'API Endpoints — subpackage_exports. 4 operations. Lead operation: List all the exports. Self-contained Naftiko
    capability covering one Close business surface.'
  tags:
  - Close
  - subpackage_exports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOSE_API_KEY: CLOSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: close-subpackage-exports
    baseUri: https://api.close.com/api/v1
    description: API Endpoints — subpackage_exports business capability. Self-contained, no shared references.
    resources:
    - name: export
      path: /export/
      operations:
      - name: list
        method: GET
        description: List all the exports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _limit
          in: query
          type: integer
          description: Number of results to return.
        - name: _skip
          in: query
          type: integer
          description: Number of results to skip before returning, for pagination.
        - name: _fields
          in: query
          type: string
          description: Comma-separated list of fields to include in the response.
        - name: Authorization
          in: header
          type: string
          description: Use your API key as the username and leave the password empty.
          required: true
    - name: export-lead
      path: /export/lead/
      operations:
      - name: createlead
        method: POST
        description: Export leads based on a search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: Use your API key as the username and leave the password empty.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: export-opportunity
      path: /export/opportunity/
      operations:
      - name: createopportunity
        method: POST
        description: Export opportunities, based on opportunity filters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: Use your API key as the username and leave the password empty.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: export-id
      path: /export/{id}/
      operations:
      - name: get
        method: GET
        description: Get a single Export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: _fields
          in: query
          type: string
          description: Comma-separated list of fields to include in the response.
        - name: Authorization
          in: header
          type: string
          description: Use your API key as the username and leave the password empty.
          required: true
    authentication:
      type: bearer
      token: '{{env.CLOSE_API_KEY}}'
  exposes:
  - type: rest
    namespace: close-subpackage-exports-rest
    port: 8080
    description: REST adapter for API Endpoints — subpackage_exports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/export
      name: export
      description: REST surface for export.
      operations:
      - method: GET
        name: list
        description: List all the exports
        call: close-subpackage-exports.list
        with:
          _limit: rest._limit
          _skip: rest._skip
          _fields: rest._fields
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export/lead
      name: export-lead
      description: REST surface for export-lead.
      operations:
      - method: POST
        name: createlead
        description: Export leads based on a search query
        call: close-subpackage-exports.createlead
        with:
          Authorization: rest.Authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export/opportunity
      name: export-opportunity
      description: REST surface for export-opportunity.
      operations:
      - method: POST
        name: createopportunity
        description: Export opportunities, based on opportunity filters
        call: close-subpackage-exports.createopportunity
        with:
          Authorization: rest.Authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/export/{id}
      name: export-id
      description: REST surface for export-id.
      operations:
      - method: GET
        name: get
        description: Get a single Export
        call: close-subpackage-exports.get
        with:
          id: rest.id
          _fields: rest._fields
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: close-subpackage-exports-mcp
    port: 9090
    transport: http
    description: MCP adapter for API Endpoints — subpackage_exports. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-exports
      description: List all the exports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: close-subpackage-exports.list
      with:
        _limit: tools._limit
        _skip: tools._skip
        _fields: tools._fields
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
    - name: export-leads-based-search-query
      description: Export leads based on a search query
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: close-subpackage-exports.createlead
      with:
        Authorization: tools.Authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: export-opportunities-based-opportunity-filters
      description: Export opportunities, based on opportunity filters
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: close-subpackage-exports.createopportunity
      with:
        Authorization: tools.Authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-single-export
      description: Get a single Export
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: close-subpackage-exports.get
      with:
        id: tools.id
        _fields: tools._fields
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
