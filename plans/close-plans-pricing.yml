specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Close
providerId: close
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - CRM
  - Sales Engagement
  - Plans
description: >-
  Close publishes four per-seat-per-month plans (Solo, Essentials, Growth,
  Scale) plus telephony and AI add-ons, and additional organization fees.
  Annual billing offers a discount versus month-to-month.
sources:
  - https://www.close.com/pricing
plans:
  - id: close-solo
    name: Solo
    type: subscription
    description: Single-user plan capped at 10,000 leads; no workflows.
    entries:
      - label: Per Month (annual)
        name: close_solo_annual
        type: flat
        metric: subscription
        timeFrame: monthly
        unit: 1
        price: '9'
        currency: USD
        userMultiplied: false
      - label: Per Month (monthly)
        name: close_solo_monthly
        type: flat
        metric: subscription
        timeFrame: monthly
        unit: 1
        price: '19'
        currency: USD
        userMultiplied: false
    elements:
      - name: 1 user, 10,000 leads max
      - name: Core CRM features
  - id: close-essentials
    name: Essentials
    type: per-seat
    description: >-
      Per-seat pricing for small teams; unlimited leads and contacts;
      built-in calling, email, and SMS.
    entries:
      - label: Per Seat / Month (annual)
        name: close_essentials_annual
        type: flat
        metric: seats
        timeFrame: monthly
        unit: 1
        price: '35'
        currency: USD
        userMultiplied: true
      - label: Per Seat / Month (monthly)
        name: close_essentials_monthly
        type: flat
        metric: seats
        timeFrame: monthly
        unit: 1
        price: '49'
        currency: USD
        userMultiplied: true
  - id: close-growth
    name: Growth
    type: per-seat
    description: >-
      Adds Chloe AI sales agent, automated workflows, Power Dialer, and
      AI Email Assistant.
    entries:
      - label: Per Seat / Month (annual)
        name: close_growth_annual
        type: flat
        metric: seats
        timeFrame: monthly
        unit: 1
        price: '99'
        currency: USD
        userMultiplied: true
      - label: Per Seat / Month (monthly)
        name: close_growth_monthly
        type: flat
        metric: seats
        timeFrame: monthly
        unit: 1
        price: '109'
        currency: USD
        userMultiplied: true
  - id: close-scale
    name: Scale
    type: per-seat
    description: >-
      Per-seat plan for larger organizations; role-based permissions,
      Predictive Dialer, unlimited call recording. Custom pricing for
      10+ users.
    entries:
      - label: Per Seat / Month (annual)
        name: close_scale_annual
        type: flat
        metric: seats
        timeFrame: monthly
        unit: 1
        price: '139'
        currency: USD
        userMultiplied: true
      - label: Per Seat / Month (monthly)
        name: close_scale_monthly
        type: flat
        metric: seats
        timeFrame: monthly
        unit: 1
        price: '149'
        currency: USD
        userMultiplied: true
  - id: close-premium-phone
    name: Premium Phone Numbers
    type: addon
    description: Premium phone-number lines for caller-ID branding.
    entries:
      - label: Per Line / Month
        name: close_premium_phone
        type: flat
        metric: phone_lines
        timeFrame: monthly
        unit: 1
        price: '19'
        currency: USD
        userMultiplied: false
  - id: close-ai-call-assistant
    name: AI Call Assistant Add-On
    type: addon
    description: AI-powered call summarization and coaching with per-minute usage fee.
    entries:
      - label: Monthly Base
        name: close_ai_assistant_monthly
        type: flat
        metric: addon
        timeFrame: monthly
        unit: 1
        price: '50'
        currency: USD
        userMultiplied: false
      - label: Per Minute
        name: close_ai_assistant_minute
        type: flat
        metric: minutes
        timeFrame: usage
        unit: 1
        price: '0.02'
        currency: USD
        userMultiplied: false
  - id: close-additional-org
    name: Additional Organization
    type: addon
    description: Each additional Close workspace beyond the included one.
    entries:
      - label: Per Org / Month
        name: close_additional_org
        type: flat
        metric: organizations
        timeFrame: monthly
        unit: 1
        price: '50'
        currency: USD
        userMultiplied: false
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
